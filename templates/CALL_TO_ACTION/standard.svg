<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810">
  <rect width="1440" height="810" fill="#0A0E1A"/>
  <line x1="80" y1="0" x2="80" y2="810" stroke="#00F0FF" stroke-width="3" stroke-opacity="0.3"/>

  <!-- Heading -->
  <text x="140" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF">{{heading|24}}</text>
  <rect x="140" y="175" width="220" height="4" fill="#00F0FF" rx="2"/>

  <!-- Call to Action layout -->
  <g transform="translate(140, 240)">
    <rect width="1160" height="440" fill="#111827" rx="24" stroke="#00F0FF" stroke-width="2" stroke-opacity="0.4"/>
    
    <!-- Large decorative background pill -->
    <rect x="920" y="40" width="200" height="360" fill="#FF007F" fill-opacity="0.1" rx="16"/>
    <text x="1020" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="black" fill="#FF007F" text-anchor="middle" letter-spacing="4">ACT NOW</text>

    <!-- List -->
    <!-- Item 1 -->
    <circle cx="60" cy="80" r="10" fill="#00F0FF"/>
    <text x="100" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">{{action_items.1|50}}</text>

    <!-- Item 2 -->
    <circle cx="60" cy="180" r="10" fill="#00F0FF"/>
    <text x="100" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">{{action_items.2|50}}</text>

    <!-- Item 3 -->
    <circle cx="60" cy="280" r="10" fill="#00F0FF"/>
    <text x="100" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">{{action_items.3|50}}</text>

    <!-- Item 4 -->
    <circle cx="60" cy="380" r="10" fill="#00F0FF"/>
    <text x="100" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">{{action_items.4|50}}</text>
  </g>
</svg>
