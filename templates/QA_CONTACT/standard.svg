    <rect x="-450" y="-220" width="900" height="400" fill="#111827" fill-opacity="0.7" rx="24" stroke="#FF007F" stroke-width="2" stroke-opacity="0.4"/>
    
    <text x="0" y="-120" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="extrabold" fill="#00F0FF" text-anchor="middle">Questions &amp; Answers</text>
