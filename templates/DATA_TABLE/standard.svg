<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810">
  <rect width="1440" height="810" fill="#0A0E1A"/>
  <line x1="80" y1="0" x2="80" y2="810" stroke="#00F0FF" stroke-width="3" stroke-opacity="0.3"/>

  <!-- Heading -->
  <text x="140" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF">{{heading|24}}</text>
  <rect x="140" y="175" width="220" height="4" fill="#00F0FF" rx="2"/>

  <!-- Sleek Data Table Grid -->
  <g transform="translate(140, 240)">
    <!-- Header background -->
    <rect width="1160" height="70" fill="#111827" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.4" rx="8"/>
    
    <!-- Table Headers -->
    <text x="50" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#00F0FF">{{header_1|20}}</text>
    <text x="350" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#00F0FF">{{header_2|20}}</text>
    <text x="650" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#00F0FF">{{header_3|20}}</text>
    <text x="950" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#00F0FF">{{header_4|20}}</text>
    
    <!-- Row 1 -->
    <rect y="90" width="1160" height="70" fill="#111827" fill-opacity="0.3" rx="8"/>
    <text x="50" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_1_1|20}}</text>
    <text x="350" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_1_2|20}}</text>
    <text x="650" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_1_3|20}}</text>
    <text x="950" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_1_4|20}}</text>

    <!-- Row 2 -->
    <rect y="180" width="1160" height="70" fill="#111827" fill-opacity="0.3" rx="8"/>
    <text x="50" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_2_1|20}}</text>
    <text x="350" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_2_2|20}}</text>
    <text x="650" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_2_3|20}}</text>
    <text x="950" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_2_4|20}}</text>

    <!-- Row 3 -->
    <rect y="270" width="1160" height="70" fill="#111827" fill-opacity="0.3" rx="8"/>
    <text x="50" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_3_1|20}}</text>
    <text x="350" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_3_2|20}}</text>
    <text x="650" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_3_3|20}}</text>
    <text x="950" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#E2E8F0">{{row_3_4|20}}</text>
  </g>
</svg>
