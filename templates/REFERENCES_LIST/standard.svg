    <text x="40" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">{{source_title_2|70}}</text>
    <text x="40" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#FF007F">{{source_url_2|80}}</text>

    <!-- Source 3 -->
