    <text x="40" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">{{source_title_3|70}}</text>
    <text x="40" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#00F0FF">{{source_url_3|80}}</text>
