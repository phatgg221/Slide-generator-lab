<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810">
  <rect width="1440" height="810" fill="#0A0E1A"/>
  <line x1="80" y1="0" x2="80" y2="810" stroke="#00F0FF" stroke-width="3" stroke-opacity="0.3"/>
  <circle cx="1200" cy="150" r="160" fill="#FF007F" fill-opacity="0.05"/>

  <!-- Heading -->
  <text x="140" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF">{{heading|24}}</text>
  <rect x="140" y="175" width="220" height="4" fill="#00F0FF" rx="2"/>

  <!-- Summary Cards -->
  <g transform="translate(140, 240)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="530" height="180" fill="#111827" rx="16" stroke="#00F0FF" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M 30,90 L 45,105 L 75,70" stroke="#00F0FF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#E2E8F0">{{summary_points.1|35}}</text>

    <!-- Card 2 -->
    <rect x="580" y="0" width="530" height="180" fill="#111827" rx="16" stroke="#FF007F" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M 610,90 L 625,105 L 655,70" stroke="#FF007F" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="680" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#E2E8F0">{{summary_points.2|35}}</text>

    <!-- Card 3 -->
    <rect x="0" y="220" width="530" height="180" fill="#111827" rx="16" stroke="#FF007F" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M 30,310 L 45,325 L 75,290" stroke="#FF007F" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#E2E8F0">{{summary_points.3|35}}</text>

    <!-- Card 4 -->
    <rect x="580" y="220" width="530" height="180" fill="#111827" rx="16" stroke="#00F0FF" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M 610,310 L 625,325 L 655,290" stroke="#00F0FF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="680" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#E2E8F0">{{summary_points.4|35}}</text>
  </g>
</svg>
