<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810">
  <rect width="1440" height="810" fill="#0A0E1A"/>
  <line x1="80" y1="0" x2="80" y2="810" stroke="#00F0FF" stroke-width="3" stroke-opacity="0.3"/>
  <circle cx="1200" cy="150" r="160" fill="#FF007F" fill-opacity="0.05"/>

  <!-- Heading -->
  <text x="140" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF">{{heading|24}}</text>
  <rect x="140" y="175" width="220" height="4" fill="#00F0FF" rx="2"/>

  <!-- Bullets list -->
  <g transform="translate(140, 240)">
    <!-- Bullet 1 -->
    <rect x="0" y="25" width="16" height="16" fill="#00F0FF" rx="4"/>
    <text x="40" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#E2E8F0">{{bullets.1|70}}</text>

    <!-- Bullet 2 -->
    <rect x="0" y="115" width="16" height="16" fill="#00F0FF" rx="4"/>
    <text x="40" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#E2E8F0">{{bullets.2|70}}</text>

    <!-- Bullet 3 -->
    <rect x="0" y="205" width="16" height="16" fill="#00F0FF" rx="4"/>
    <text x="40" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#E2E8F0">{{bullets.3|70}}</text>

    <!-- Bullet 4 -->
    <rect x="0" y="295" width="16" height="16" fill="#00F0FF" rx="4"/>
    <text x="40" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#E2E8F0">{{bullets.4|70}}</text>

    <!-- Bullet 5 -->
    <rect x="0" y="385" width="16" height="16" fill="#00F0FF" rx="4"/>
    <text x="40" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#E2E8F0">{{bullets.5|70}}</text>
  </g>
</svg>
