    <circle cx="0" cy="0" r="16" fill="#00F0FF"/>
    <circle cx="0" cy="0" r="8" fill="#FFFFFF"/>
    <text x="0" y="-120" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#00F0FF" text-anchor="middle">{{date_3|15}}</text>
    <text x="0" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#E2E8F0" text-anchor="middle">{{desc_3.1|25}}</text>
    <text x="0" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#E2E8F0" text-anchor="middle">{{desc_3.2|25}}</text>
  </g>

  <!-- Milestone 4 -->
  <g transform="translate(1070, 450)">
    <circle cx="0" cy="0" r="16" fill="#FF007F"/>
    <circle cx="0" cy="0" r="8" fill="#FFFFFF"/>
    <text x="0" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="#FF007F" text-anchor="middle">{{date_4|15}}</text>
    <text x="0" y="-70" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#E2E8F0" text-anchor="middle">{{desc_4.1|25}}</text>
    <text x="0" y="-40" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#E2E8F0" text-anchor="middle">{{desc_4.2|25}}</text>
