    <text x="0" y="-70" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#E2E8F0" text-anchor="middle">{{desc_2.1|25}}</text>
    <text x="0" y="-40" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#E2E8F0" text-anchor="middle">{{desc_2.2|25}}</text>
  </g>

  <!-- Milestone 3 -->
