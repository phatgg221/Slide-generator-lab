<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810">
  <rect width="1440" height="810" fill="#0A0E1A"/>
  <line x1="80" y1="0" x2="80" y2="810" stroke="#00F0FF" stroke-width="3" stroke-opacity="0.3"/>

  <!-- Heading -->
  <text x="140" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF">{{heading|24}}</text>
  <rect x="140" y="175" width="220" height="4" fill="#00F0FF" rx="2"/>

  <!-- Stat Columns -->
  <!-- Col 1 -->
  <g transform="translate(140, 280)">
    <rect width="340" height="360" fill="#111827" rx="16" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="170" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="black" fill="#00F0FF" text-anchor="middle">{{stat_1|12}}</text>
    <text x="170" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#E2E8F0" text-anchor="middle">{{label_1|30}}</text>
  </g>

  <!-- Col 2 -->
  <g transform="translate(520, 280)">
    <rect width="340" height="360" fill="#111827" rx="16" stroke="#FF007F" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="170" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="black" fill="#FF007F" text-anchor="middle">{{stat_2|12}}</text>
    <text x="170" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#E2E8F0" text-anchor="middle">{{label_2|30}}</text>
  </g>

  <!-- Col 3 -->
  <g transform="translate(900, 280)">
    <rect width="340" height="360" fill="#111827" rx="16" stroke="#00F0FF" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="170" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="black" fill="#00F0FF" text-anchor="middle">{{stat_3|12}}</text>
    <text x="170" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#E2E8F0" text-anchor="middle">{{label_3|30}}</text>
  </g>
</svg>
