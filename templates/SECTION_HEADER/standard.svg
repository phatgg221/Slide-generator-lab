<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810">
  <rect width="1440" height="810" fill="#0A0E1A"/>
  <line x1="80" y1="0" x2="80" y2="810" stroke="#00F0FF" stroke-width="3" stroke-opacity="0.3"/>
  
  <!-- Geometric backdrop visual -->
  <rect x="300" y="250" width="840" height="300" fill="none" stroke="#FF007F" stroke-width="2" stroke-opacity="0.2" rx="20"/>
  <rect x="320" y="270" width="800" height="260" fill="none" stroke="#00F0FF" stroke-width="1" stroke-opacity="0.2" rx="16"/>

  <!-- Centered content -->
  <g transform="translate(720, 400)">
    <!-- Sub-module kicker -->
    <text x="0" y="-60" font-family="system-ui, -apple-system, sans-serif" font-size="24" letter-spacing="4" font-weight="600" fill="#FF007F" text-anchor="middle">{{sub_module_name|40}}</text>
    
    <!-- Giant Heading -->
    <text x="0" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="extrabold" fill="#FFFFFF" text-anchor="middle">{{heading|24}}</text>
    
    <rect x="-150" y="80" width="300" height="4" fill="#00F0FF" rx="2"/>
  </g>
</svg>
