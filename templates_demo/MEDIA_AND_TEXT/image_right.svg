  <text x="90" y="300" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#2F3A4A">{{body.1|46}}</text>
  <text x="90" y="346" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#2F3A4A">{{body.2|46}}</text>
  <text x="90" y="392" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#2F3A4A">{{body.3|46}}</text>
  <text x="90" y="720" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#E4654F">{{caption|40}}</text>
</svg>
