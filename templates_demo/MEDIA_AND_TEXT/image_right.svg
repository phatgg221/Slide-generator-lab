  <rect x="760" y="90" width="600" height="630" rx="24" fill="#E4654F" fill-opacity="0.12"/>
  <!-- generated image fills this slot -->
  <clipPath id="imgclip"><rect x="780" y="110" width="560" height="590" rx="18"/></clipPath>
  <image x="780" y="110" width="560" height="590" preserveAspectRatio="xMidYMid slice"
         clip-path="url(#imgclip)" href="{{media.image}}"/>
